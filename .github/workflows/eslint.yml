name: ESLint matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
  with:
    node-version: 20
    cache: npm
    cache-dependency-path: openclaw-revenue-engine/package-lock.json

      - run: npm ci

      - run: npm run lint
        env:
          CI: true
