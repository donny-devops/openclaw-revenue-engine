name: Revenue Engine - Poll

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      lane:
        description: "Lane slug to poll (blank = all)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: revenue-engine-poll
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # Must finish before next cron tick

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Poll Moltgate inbox
        env:
          MOLTGATE_API_KEY: ${{ secrets.MOLTGATE_API_KEY }}
          MOLTGATE_BASE_URL: ${{ secrets.MOLTGATE_BASE_URL }}
          MOLTGATE_PROFILE_HANDLE: ${{ secrets.MOLTGATE_PROFILE_HANDLE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LOG_LEVEL: INFO
          INPUT_LANE: ${{ github.event.inputs.lane }}
        run: |
          set -euo pipefail

          # Default base URL if secret is unset/empty
          BASE_URL="${MOLTGATE_BASE_URL:-https://moltgate.com}"
          export MOLTGATE_BASE_URL="$BASE_URL"

          # Normalize lane (works for schedule + workflow_dispatch)
          LANE="${INPUT_LANE:-}"
          LANE_FLAG=""
          if [ -n "$LANE" ]; then
            LANE_FLAG="--lane $LANE"
          fi

          python main.py --once --direct-api --poll-only $LANE_FLAG
