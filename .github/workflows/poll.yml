name: Revenue Engine - Poll

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      lane:
        description: "Lane slug to poll (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Validate poll runtime without calling Moltgate"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: revenue-engine-poll
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Concurrency guard prevents overlap; allow full poll window

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            api.anthropic.com:443
            moltgate.com:443
            pypi.org:443
            files.pythonhosted.org:443
            github.com:443

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Poll Moltgate inbox
        env:
          MOLTGATE_API_KEY: ${{ secrets.MOLTGATE_API_KEY }}
          MOLTGATE_BASE_URL: ${{ secrets.MOLTGATE_BASE_URL }}
          MOLTGATE_PROFILE_HANDLE: ${{ secrets.MOLTGATE_PROFILE_HANDLE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LOG_LEVEL: INFO
          INPUT_LANE: ${{ github.event_name == 'workflow_dispatch' && inputs.lane || '' }}
          INPUT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          BASE_URL="${MOLTGATE_BASE_URL:-https://moltgate.com}"
          export MOLTGATE_BASE_URL="$BASE_URL"

          args=(--once --direct-api --poll-only)

          if [ -n "${INPUT_LANE:-}" ]; then
            args+=(--lane "$INPUT_LANE")
          fi

          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            args+=(--dry-run)
          fi

          python main.py "${args[@]}"
