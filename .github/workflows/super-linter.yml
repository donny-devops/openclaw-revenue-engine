name: Super-Linter

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    name: Super-Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter@v8.6.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          # JS/TS already uses the existing ESLint workflow.
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_JSCPD: false
          # Biome is an alternative JS/TS linter/formatter.
          VALIDATE_BIOME_LINT: false
          VALIDATE_BIOME_FORMAT: false
          # Repo style is single-quote with 2-space indent.
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          # Docs, JSON, and YAML are covered by focused review/checks.
          VALIDATE_MARKDOWN: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_YAML: false
          VALIDATE_YAML_PRETTIER: false
          # Dockerfile/IaC vulnerability scanning is owned by Trivy.
          VALIDATE_CHECKOV: false
          # Action security scanning belongs in a separate hardening PR.
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          # Keep least-privilege permissions; do not write PR comments.
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
