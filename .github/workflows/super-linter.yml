name: Super-Linter

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    name: Super-Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter@v8.6.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          # JS/TS already linted by the existing ESLint workflow (eslint.yml).
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_JSCPD: false
          # Biome is an alternative JS/TS linter/formatter; we standardize on ESLint.
          VALIDATE_BIOME_LINT: false
          VALIDATE_BIOME_FORMAT: false
          # Repo style is single-quote + 2-space indent; do not enforce Prettier defaults.
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          # JSON formatting is handled outside this broad linter to avoid duplicate policy noise.
          VALIDATE_JSON_PRETTIER: false
          # Dockerfile/IaC vulnerability scanning is owned by codescan.yml (Trivy).
          VALIDATE_CHECKOV: false
          # Action security scanning is in scope for a separate hardening PR.
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          # Keep least-privilege permissions; do not require PR comment writes.
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
