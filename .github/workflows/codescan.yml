name: Code Scan (Trivy)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

     - name: Run Trivy filesystem scan
       uses: aquasecurity/trivy-action@0.35.0  # Pin to safe, recent version [web:5][page:2]
       with:
         scan-type: 'fs'  # Filesystem scan of current directory [web:1]
         scan-ref: '.'    # Scan the checked-out repo root [web:1]
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
