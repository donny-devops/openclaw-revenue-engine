name: Full CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CI: "true"

permissions:
  contents: read

concurrency:
  group: full-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs:
      - rust
      - rust-security
      - api-contract

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (for build, if needed)
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build --if-present

      - name: Deploy via Railway
        uses: railwayapp/railway-action@v2
        with:
          serviceId: ${{ secrets.RAILWAY_SERVICE_ID }}
          environmentId: ${{ secrets.RAILWAY_ENV_ID }}
          apiToken: ${{ secrets.RAILWAY_TOKEN }}

  # -----------------------------
  # RUST CI (matrix)
  # -----------------------------
  rust:
    name: Rust CI (toolchain ${{ matrix.rust }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets --verbose

      - name: Test
        run: cargo test --all-targets --verbose

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  # -----------------------------
  # RUST SECURITY AUDIT
  # -----------------------------
  rust-security:
    name: Rust Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run audit
        run: cargo audit

  # -----------------------------
  # NODE API + CONTRACT TESTS
  # -----------------------------
  api-contract:
    name: API & Contract Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node: [22.x]

    env:
      NODE_ENV: test
      LOG_LEVEL: silent
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      GITHUB_WEBHOOK_SECRET: ci_github_webhook_placeholder
      JWT_SECRET: ci_jwt_secret_placeholder

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --if-present

      - name: API tests
        id: api
        run: npm run test:api

      - name: Contract tests
        id: contract
        if: always() && steps.api.conclusion != 'cancelled'
        run: npm run test:contract

      - name: Upload OpenAPI spec
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.yaml
          retention-days: 14

            deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs:
      - rust
      - rust-security
      - api-contract

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

