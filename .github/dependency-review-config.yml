# Configuration for actions/dependency-review-action@v4
# Referenced from .github/workflows/dependency-review.yml via the
# `config-file` input. Keeping policy here (instead of inline in the
# workflow) makes the license set easier to audit and update.

fail-on-severity: high
comment-summary-in-pr: always

# Denied licenses. Includes legacy SPDX IDs (GPL-2.0, GPL-3.0, AGPL-3.0)
# and modern -only / -or-later variants so both forms are matched.
deny-licenses:
  - GPL-2.0
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-3.0
  - GPL-3.0-only
  - GPL-3.0-or-later
  - AGPL-3.0
  - AGPL-3.0-only
  - AGPL-3.0-or-later

# CI-only tooling exempt from the copyleft ban above. These are GitHub
# Actions referenced from workflows, not dependencies bundled into the
# shipped product, so their AGPL licensing does not propagate to the
# runtime artifact.
allow-dependencies-licenses:
  - pkg:githubactions/trufflesecurity/trufflehog
